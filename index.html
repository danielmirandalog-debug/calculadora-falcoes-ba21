<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Taxas - Falcões da BA21</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js" defer></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #FFFDE7; margin: 0; color: #333; }
        header { background: #FFE600; color: #333; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; border-bottom: 3px solid #333; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #FFE600; }
        h3 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; font-size: 17px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 3px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; background: #FFE600; color: #333; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #ffd600; }
        
        .btn-exportar { background: #555 !important; color: white !important; text-transform: uppercase !important; font-weight: bold !important; }
        .btn-exportar:hover { background: #333 !important; }

        .btn-limpar { width: auto; padding: 5px 10px; font-size: 10px; background: #f5f5f5; color: #d32f2f; border: 1px solid #ddd; margin: 0; text-transform: none; }
        
        .grid-taxas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        /* Força a antecipação a ocupar uma linha inteira ou ser o último no grid */
        .full-width { grid-column: span 2; }
        
        .upload-group { display: flex; gap: 8px; margin: 10px 0; }
        .btn-upload { flex: 1; background: #fcfcfc; border: 2px solid #FFE600; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 12px; color: #555; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .radioLinha { display: flex; gap: 15px; margin: 10px 0; background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #FFF9C4; }
        .taxaRuim { color: #d32f2f; font-weight: bold; }
        .campeao-msg { color: #007bff; font-weight: bold; font-size: 18px; text-align: center; margin-top: 20px; padding: 15px; border: 2px solid #007bff; border-radius: 10px; background: #e3f2fd; }

        .barraContainer { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .barraProgresso { height: 100%; width: 0%; background: #FFE600; transition: 0.4s; }
        #areaRelatorio { position: absolute; left: -9999px; width: 700px; background: white; padding: 40px; }
    </style>
</head>
<body>

<header>Falcões da BA21 - Simulador Premium</header>

<div class="container">
    <div class="card">
        <h3>Atendimento <button type="button" class="btn-limpar" onclick="location.reload()">Resetar</button></h3>
        <div class="grid-taxas">
            <span><label>Empresa</label><input id="input_loja" type="text" placeholder="Ex: Padaria"></span>
            <span><label>Cliente</label><input id="input_cliente" type="text" placeholder="Ex: João"></span>
        </div>
        <span><label>Data</label><input id="input_data" type="text" readonly style="background:#f5f5f5"></span>
    </div>

    <div class="card">
        <label>Valor da Venda (R$)</label>
        <input id="valor" type="number" step="0.01" value="1000.00">
    </div>

    <div class="card">
        <h3>Mercado Pago <button type="button" class="btn-limpar" onclick="limparSecao('mp')">Limpar</button></h3>
        <div class="grid-taxas">
            <span><label>Pix (%)</label> <input id="mp_pix" type="number" step="0.01" value="0.49"></span>
            <span><label>Débito (%)</label> <input id="mp_debito" type="number" step="0.01" value="0.99"></span>
            <span><label>Crédito 1x (%)</label> <input id="mp1" type="number" step="0.01" value="3.05"></span>
        </div>
        <div id="mpParcelas" class="grid-taxas"></div>
    </div>

    <div class="card">
        <h3>Concorrência <button type="button" class="btn-limpar" onclick="limparSecao('out')">Limpar</button></h3>
        <div class="radioLinha">
            <label><input type="radio" name="modoOutras" value="mdr" checked onchange="trocarModoOutras()"> MDR + Ant.</label>
            <label><input type="radio" name="modoOutras" value="manual" onchange="trocarModoOutras()"> Manual / Foto</label>
        </div>
        
        <div id="modoMDR">
            <div class="grid-taxas">
                <span><label>Pix (%)</label> <input id="out_pix" type="number" step="0.01"></span>
                <span><label>Débito (%)</label> <input id="out_debito" type="number" step="0.01"></span>
                <span><label>MDR 1x (%)</label> <input id="out_mdr_1x" type="number" step="0.01"></span>
                <span><label>MDR 2x-6x (%)</label> <input id="mdr_2_6" type="number" step="0.01"></span>
                <span><label>MDR 7x-13x (%)</label> <input id="mdr_7_13" type="number" step="0.01"></span>
                <span><label>MDR 14x-18x (%)</label> <input id="mdr_14_18" type="number" step="0.01"></span>
                <span class="full-width"><label>Antecipação Mensal (%)</label> <input id="antecipacao" type="number" step="0.01"></span>
            </div>
        </div>

        <div id="modoManual" style="display:none">
            <div class="upload-group">
                <label class="btn-upload"><input type="file" capture="camera" style="display:none" onchange="processarOCR(event, 'out')">📷 Câmera</label>
                <label class="btn-upload"><input type="file" style="display:none" onchange="processarOCR(event, 'out')">📁 Arquivo</label>
            </div>
            <div class="grid-taxas">
                 <span><label>Pix (%)</label> <input id="out_pix_manual" type="number" step="0.01"></span>
                 <span><label>Débito (%)</label> <input id="out_debito_manual" type="number" step="0.01"></span>
                 <span><label>Crédito 1x (%)</label> <input id="out1_manual" type="number" step="0.01"></span>
            </div>
            <div id="outrasParcelas" class="grid-taxas"></div>
        </div>
    </div>

    <div class="card">
        <button onclick="simular()">Comparar Taxas</button>
        <div id="resultado"></div>
        <button id="btnExportarSimples" class="btn-exportar" onclick="exportarRelatorio(true)" style="display:none; margin-top: 15px;">Exportar Comparação</button>
    </div>

    <div class="card">
        <h3>Faturamento e Share</h3>
        <div class="barraContainer"><div class="barraProgresso" id="barra"></div></div>
        <input id="faturamento" type="number" placeholder="Faturamento Mensal (R$)">
        <div class="grid-taxas">
            <span>Pix %: <input id="share_pix" oninput="atualizarBarra()" type="number"></span>
            <span>Débito %: <input id="share_debito" oninput="atualizarBarra()" type="number"></span>
            <span>1x %: <input id="share_1x" oninput="atualizarBarra()" type="number"></span>
            <span>2x-6x %: <input id="share_2_6" oninput="atualizarBarra()" type="number"></span>
            <span>7x-13x %: <input id="share_7_13" oninput="atualizarBarra()" type="number"></span>
            <span>14x-18x %: <input id="share_14_18" oninput="atualizarBarra()" type="number"></span>
        </div>
        <button onclick="simularFaturamento()">Calcular Projeção Completa</button>
        <div id="resultadoFaturamento"></div>
        <canvas id="graficoEconomia" style="margin-top:20px; max-height: 300px;"></canvas>
    </div>

    <div class="card">
        <button onclick="exportarRelatorio(false)" class="btn-exportar">Gerar Relatório Completo</button>
    </div>
</div>

<div id="areaRelatorio">
    <div style="text-align:center; border-bottom:4px solid #FFE600; padding-bottom:20px; margin-bottom:20px;">
        <h1>Falcões da BA21</h1>
        <p>Proposta Estratégica Mercado Pago</p>
    </div>
    <div id="rel_corpo"></div>
</div>

</body>
</html>
