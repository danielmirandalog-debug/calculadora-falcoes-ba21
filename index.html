<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Taxas - Falcões da BA21</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js" defer></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #FFFDE7; margin: 0; color: #333; }
        header { background: #FFE600; color: #333; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #FFE600; }
        h3 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { font-size: 13px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; background: #FFE600; color: #333; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-limpar { width: auto; padding: 6px 12px; font-size: 11px; background: #f5f5f5; color: #d32f2f; border: 1px solid #ddd; margin: 0; }
        
        /* Estilo para os novos botões de upload lado a lado */
        .upload-group { display: flex; gap: 10px; margin: 10px 0; }
        .btn-upload-manual { flex: 1; background: #fcfcfc; border: 2px solid #FFE600; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; color: #555; font-weight: bold; }
        .btn-upload-manual:hover { background: #fffde7; }

        .radioLinha { display: flex; gap: 20px; margin: 15px 0; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .barraContainer { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .barraProgresso { height: 100%; width: 0%; background: #FFE600; transition: 0.4s; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        th { background: #FFF9C4; }
        .taxaRuim { color: #d32f2f; font-weight: bold; }
        .info-data { font-size: 11px; color: #999; text-align: right; margin-top: 15px; }
    </style>
</head>
<body>

<header>Falcões da BA21 - Simulador Premium</header>

<div class="container" id="conteudoParaExportar">
    
    <div class="card">
        <label>Valor da Venda para Simulação (R$)</label>
        <input id="valor" type="number" placeholder="Ex: 1000.00" step="0.01">
    </div>

    <div class="card">
        <h3>Mercado Pago <button type="button" class="btn-limpar" onclick="limparSecao('mp')">Limpar Taxas</button></h3>
        <label>Pix (%)</label> <input id="mp_pix" type="number" step="0.01" value="0.49">
        <label>Débito (%)</label> <input id="mp_debito" type="number" step="0.01" value="0.99">
        <label>Crédito 1x (%)</label> <input id="mp1" type="number" step="0.01" value="3.05">
        
        <label>Importar Taxas (MP):</label>
        <div class="upload-group">
            <label class="btn-upload-manual">
                <input type="file" id="camMP" accept="image/*" capture="camera" style="display:none" onchange="processarOCRMP(event)">
                📷 Tirar Foto
            </label>
            <label class="btn-upload-manual">
                <input type="file" id="galMP" accept="image/*" style="display:none" onchange="processarOCRMP(event)">
                📁 Galeria
            </label>
        </div>
        <div id="mpParcelas"></div>
    </div>

    <div class="card">
        <h3>Concorrência <button type="button" class="btn-limpar" onclick="limparSecao('out')">Limpar Taxas</button></h3>
        <div class="radioLinha">
            <label><input type="radio" name="modoOutras" value="mdr" checked onchange="trocarModoOutras()"> MDR + Ant.</label>
            <label><input type="radio" name="modoOutras" value="manual" onchange="trocarModoOutras()"> Manual / Foto</label>
        </div>

        <div id="modoMDR">
            <label>Pix (%)</label> <input id="out_pix" type="number" step="0.01">
            <label>Débito (%)</label> <input id="out_debito" type="number" step="0.01">
            <label>Crédito 1x (%)</label> <input id="out1" type="number" step="0.01">
            <label>MDR 2-6x (%)</label> <input id="mdr1" type="number" step="0.01">
            <label>MDR 7-12x (%)</label> <input id="mdr2" type="number" step="0.01">
            <label>MDR 13-21x (%)</label> <input id="mdr3" type="number" step="0.01">
            <label>Antecipação Mensal (%)</label> <input id="antecipacao" type="number" step="0.01">
        </div>

        <div id="modoManual" style="display:none">
            <label>Pix (%)</label> <input id="out_pix_manual" type="number" step="0.01">
            <label>Débito (%)</label> <input id="out_debito_manual" type="number" step="0.01">
            <label>Crédito 1x (%)</label> <input id="out1_manual" type="number" step="0.01">
            
            <label>Importar Taxas (Conc.):</label>
            <div class="upload-group">
                <label class="btn-upload-manual">
                    <input type="file" id="camConc" accept="image/*" capture="camera" style="display:none" onchange="processarOCRConc(event)">
                    📷 Tirar Foto
                </label>
                <label class="btn-upload-manual">
                    <input type="file" id="galConc" accept="image/*" style="display:none" onchange="processarOCRConc(event)">
                    📁 Galeria
                </label>
            </div>
            <div id="outrasParcelas"></div>
        </div>
    </div>

    <div class="card">
        <button onclick="simular()">COMPARAR TAXAS AGORA</button>
        <div id="resultado"></div>
        <div id="dataSimulacao" class="info-data"></div>
    </div>

    <div class="card">
        <h3>Share de Vendas <button type="button" class="btn-limpar" onclick="limparSecao('share')">Limpar Share</button></h3>
        <div class="barraContainer"><div class="barraProgresso" id="barra"></div></div>
        <div style="text-align:right; margin-bottom:15px;">Total: <span id="contador">0%</span></div>

        <label>Faturamento Mensal (R$)</label>
        <input id="faturamento" type="number" placeholder="Ex: 50000.00">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <span>Pix %: <input id="share_pix" oninput="atualizarBarra()" type="number"></span>
            <span>Débito %: <input id="share_debito" oninput="atualizarBarra()" type="number"></span>
            <span>1x %: <input id="share_1x" oninput="atualizarBarra()" type="number"></span>
            <span>2x %: <input id="share_2x" oninput="atualizarBarra()" type="number"></span>
            <span>4x %: <input id="share_4x" oninput="atualizarBarra()" type="number"></span>
            <span>6x %: <input id="share_6x" oninput="atualizarBarra()" type="number"></span>
            <span>10x %: <input id="share_10x" oninput="atualizarBarra()" type="number"></span>
        </div>

        <h3 style="margin-top:20px;">Cofrinho <button type="button" class="btn-limpar" onclick="limparSecao('cofrinho')">Limpar Cofrinho</button></h3>
        <label>Custos Fixos Concorrência (R$)</label>
        <input id="custos_fixos_total" type="number">
        <label>Investimento Mensal Cofrinho (R$)</label>
        <input id="cofrinho_reserva" type="number">
        <label>CDI Anual (%)</label>
        <input id="cofrinho_percentual" type="number" step="0.01">

        <button onclick="simularFaturamento()" style="background:#3483FA; color:white;">CALCULAR RESULTADOS</button>
        <div id="resultadoFaturamento"></div>
        <canvas id="graficoEconomia" style="margin-top:20px"></canvas>
    </div>

    <div class="card">
        <button onclick="exportar()" style="background: #222; color: white;">SALVAR RELATÓRIO</button>
    </div>
</div>

</body>
</html>
