<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de taxas e lucros - Falcões da BA21</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js" defer></script>

    <style>
        body{ font-family:Segoe UI,Arial; background:#FFFDE7; margin:0; }
        header{ background:#FFE600; color:#333; padding:15px; text-align:center; font-size:22px; font-weight:bold; }
        .container{ max-width:900px; margin:auto; padding:20px; }
        .card{ background:white; padding:20px; margin-bottom:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.08); border-top:4px solid #FFE600; }
        input{ width:100%; padding:8px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; box-sizing: border-box; }
        input:focus{ outline:none; border-color:#3483FA; box-shadow:0 0 0 2px rgba(52,131,250,0.15); }
        button{ width:100%; padding:12px; margin-top:10px; border:none; border-radius:6px; background:#FFE600; color:#333; font-weight:bold; cursor:pointer; transition:0.2s; }
        button:hover{ background:#ffd400; }
        table{ width:100%; border-collapse:collapse; font-size:11px; margin-top: 10px; }
        td,th{ border:1px solid #eee; padding:4px; text-align:center; }
        th{ background:#FFF3A0; }
        .taxaRuim{ color:#E53935; font-weight:bold; }
        .radioLinha{ display:flex; gap:20px; margin-bottom:15px; }
        .tituloFat{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .contador{ font-weight:bold; font-size:18px; color:#3483FA; }
        .barraContainer{ width:100%; height:22px; background:#f0f0f0; border-radius:12px; overflow:hidden; margin-bottom:20px; }
        .barraProgresso{ height:100%; width:0%; background:#FFE600; transition:width 0.3s; }
        .info-data { font-size: 10px; color: #999; text-align: right; margin-top: 5px; }
        
        /* Estilo para os botões de upload que parecem botões normais */
        .btn-upload {
            background-color: #f4f4f4;
            color: #333;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 6px;
            display: inline-block;
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header>
    Calculadora de taxas e lucros Falcões da BA21
</header>

<div class="container" id="conteudoParaExportar">
    <div class="card">
        <label>Valor da venda (R$)</label>
        <input id="valor" type="number" placeholder="0,00">
    </div>

    <div class="card">
        <h3>Mercado Pago</h3>
        <label>Pix (%)</label> <input id="mp_pix" type="number" step="0.01">
        <label>Débito (%)</label> <input id="mp_debito" type="number" step="0.01">
        <label>Crédito 1x (%)</label> <input id="mp1" type="number" step="0.01">
        
        <h4>Importar taxas por foto</h4>
        <label class="btn-upload">
            <input type="file" id="uploadOCR" accept="image/*" capture="camera" style="display:none">
            📷 Abrir Câmera ou Galeria
        </label>
        <div id="mpParcelas"></div>
    </div>

    <div class="card">
        <h3>Concorrência</h3>
        <div class="radioLinha">
            <label><input type="radio" name="modoOutras" value="mdr" checked onchange="trocarModoOutras()"> MDR + Antecipação</label>
            <label><input type="radio" name="modoOutras" value="manual" onchange="trocarModoOutras()"> Manual</label>
        </div>

        <div id="modoMDR">
            <label>Pix (%)</label> <input id="out_pix" type="number" step="0.01">
            <label>Débito (%)</label> <input id="out_debito" type="number" step="0.01">
            <label>Crédito 1x (%)</label> <input id="out1" type="number" step="0.01">
            <label>MDR 2-6x</label> <input id="mdr1" type="number" step="0.01">
            <label>MDR 7-12x</label> <input id="mdr2" type="number" step="0.01">
            <label>MDR 13-21x</label> <input id="mdr3" type="number" step="0.01">
            <label>Antecipação mensal (%)</label> <input id="antecipacao" type="number" step="0.01">
        </div>

        <div id="modoManual" style="display:none">
            <label>Pix (%)</label> <input id="out_pix_manual" type="number" step="0.01">
            <label>Débito (%)</label> <input id="out_debito_manual" type="number" step="0.01">
            <label>Crédito 1x (%)</label> <input id="out1_manual" type="number" step="0.01">
            <h4>Importar taxas por foto</h4>
            <label class="btn-upload">
                <input type="file" id="uploadOCRConc" accept="image/*" capture="camera" style="display:none">
                📷 Abrir Câmera ou Galeria
            </label>
            <div id="outrasParcelas"></div>
        </div>
    </div>

    <div class="card">
        <button onclick="simular()">SIMULAR COMPARAÇÃO DE TAXAS</button>
        <div id="resultado"></div>
        <div id="dataSimulacao" class="info-data"></div>
    </div>

    <div class="card">
        <div class="tituloFat">
            <h3>Simulação de Faturamento Mensal</h3>
            <div class="contador" id="contador">0%</div>
        </div>
        <div class="barraContainer">
            <div class="barraProgresso" id="barra"></div>
        </div>

        <label>Faturamento mensal total (R$)</label>
        <input id="faturamento" type="number">

        <label>Distribuição de Vendas (Share %)</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <span>Pix: <input id="share_pix" oninput="atualizarBarra()" type="number"></span>
            <span>Débito: <input id="share_debito" oninput="atualizarBarra()" type="number"></span>
            <span>1x: <input id="share_1x" oninput="atualizarBarra()" type="number"></span>
            <span>2x: <input id="share_2x" oninput="atualizarBarra()" type="number"></span>
            <span>4x: <input id="share_4x" oninput="atualizarBarra()" type="number"></span>
            <span>6x: <input id="share_6x" oninput="atualizarBarra()" type="number"></span>
            <span>10x: <input id="share_10x" oninput="atualizarBarra()" type="number"></span>
        </div>

        <h3>Custos Fixos (Concorrência)</h3>
        <label>Sistema/Aluguel/Taxas Bancárias (Soma Mensal R$)</label>
        <input id="custos_fixos_total" type="number" placeholder="Ex: 250.00">

        <h3>Cofrinho Mercado Pago</h3>
        <label>Reserva Mensal (R$)</label>
        <input id="cofrinho_reserva" type="number" placeholder="Quanto vai poupar/mês">
        <label>CDI Base Atual (% ao ano - Automático)</label>
        <input id="cofrinho_percentual" type="number" step="0.01">

        <button onclick="simularFaturamento()">SIMULAR ECONOMIA E LUCRO</button>
        <div id="resultadoFaturamento"></div>
        <canvas id="graficoEconomia" style="margin-top:20px"></canvas>
    </div>

    <div class="card">
        <button onclick="exportar()" style="background: #3483FA; color: white;">EXPORTAR RELATÓRIO COMPLETO</button>
    </div>
</div>

</body>
</html>
