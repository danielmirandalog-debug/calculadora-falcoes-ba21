<div class="card">
        <h3>Concorrência <button type="button" class="btn-limpar" onclick="limparSecao('out')">Limpar</button></h3>
        <div class="upload-group">
            <label class="btn-upload"><input type="file" capture="camera" style="display:none" onchange="processarOCR(event, 'out')">📷 Câmera</label>
            <label class="btn-upload"><input type="file" style="display:none" onchange="processarOCR(event, 'out')">📁 Arquivo</label>
        </div>
        <div class="grid-taxas">
             <span><label>Pix (%)</label> <input id="out_pix_manual" type="number" step="0.01"></span>
             <span><label>Débito (%)</label> <input id="out_debito_manual" type="number" step="0.01"></span>
             <span><label>Crédito 1x (%)</label> <input id="out1_manual" type="number" step="0.01"></span>
        </div>
        <div id="outrasParcelas" class="grid-taxas"></div>
    </div>

    <div class="card">
        <h3>Faturamento e Share <button type="button" class="btn-limpar" onclick="limparSecao('share')">Limpar</button></h3>
        <h3 style="margin-top:20px;">Custos Operacionais Concorrência <button type="button" class="btn-limpar" onclick="limparSecao('fixos')">Limpar</button></h3>
        <div class="grid-taxas">
            <span><label>Mensalidade Sistema (R$)</label><input id="fixo_sistema" type="number" placeholder="0.00"></span>
            <span><label>Aluguel Máquina (R$)</label><input id="fixo_maquina" type="number" placeholder="0.00"></span>
            <span><label>Cesta Serviços (R$)</label><input id="fixo_cesta" type="number" placeholder="0.00"></span>
            <span><label>Manutenção Conta (R$)</label><input id="fixo_manutencao" type="number" placeholder="0.00"></span>
        </div>
        
        <div class="check-linha" style="background: #e8f5e9; border-color: #4caf50;">
            <div class="grid-taxas" style="width: 100%;">
                <span><label>Volume PIX no App (R$)</label><input id="vol_pix_app" type="number" placeholder="0.00"></span>
                <span><label>Taxa PIX no App (%)</label><input id="taxa_pix_app" type="number" placeholder="1.00"></span>
            </div>
        </div>
        </div>
